name: Build Resume

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-public-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compile public resume
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume_public.tex

      - name: Upload public PDF
        uses: actions/upload-artifact@v7
        with:
          name: resume-public-pdf
          path: resume_public.pdf
          if-no-files-found: error
